<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      id="aak-favicon"
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg?v=aak2"
      sizes="any"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fafafa" />
    <script>
      (function () {
        try {
          var k = 'portfolio-theme'
          var t = localStorage.getItem(k)
          var dark = t !== 'light'
          document.documentElement.classList.toggle('dark', dark)
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', dark ? '#09090b' : '#fafafa')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking fonts: don’t delay first paint -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Aditya Arun Kumar | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
